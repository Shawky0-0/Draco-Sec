# --- SURICATA STREAM / Protocol Decoder Noise ---
# These are Suricata internal TCP stream reassembly messages, NOT real alerts.
# They fire heavily when Suricata observes its own dev server connections.
suppress gen_id 1, sig_id 2210017  # SURICATA STREAM CLOSEWAIT invalid ACK
suppress gen_id 1, sig_id 2210015  # SURICATA STREAM CLOSEWAIT ACK out of window
suppress gen_id 1, sig_id 2210016  # SURICATA STREAM CLOSEWAIT FIN out of window
suppress gen_id 1, sig_id 2210046  # SURICATA STREAM SHUTDOWN RST invalid ack
suppress gen_id 1, sig_id 2210058  # SURICATA STREAM suspected RST injection
suppress gen_id 1, sig_id 2210020  # SURICATA STREAM 3WAY HANDSHAKE WRONG SEQ WRONG ACK
suppress gen_id 1, sig_id 2210032  # SURICATA STREAM FIN recv but not authenticated
suppress gen_id 1, sig_id 2210037  # SURICATA STREAM ESTABLISHED invalid ack
suppress gen_id 1, sig_id 2210050  # SURICATA STREAM TIMEWAIT invalid ack

# --- False Positive Signatures (from active response auto-blocks) ---
# These triggered auto-blocks on legitimate/internal traffic

# "GPL ATTACK_RESPONSE id check returned root"
# Fires when a response contains "uid=0(root)" - can be from testmynids.org or
# legitimate admin panels showing system info.
suppress gen_id 1, sig_id 2100498  # GPL ATTACK_RESPONSE id check returned root

# "ET INFO HTTP POST contains pass= in cleartext"
# This fires on our OWN Draco-Sec login form. Complete false positive.
suppress gen_id 1, sig_id 2010935  # ET INFO HTTP POST contains pass= in cleartext
suppress gen_id 1, sig_id 2010935, track by_src, ip 192.168.1.0/24

# "TGI HUNT PHP magic bytes in HTTP response"  
# From tgreen/hunting (now disabled as source), suppress any remaining
suppress gen_id 1, sig_id 0, track by_src, ip 44.228.249.3

# CVE-2024-9999 - This uses "9999" which is a traditional PoC/test CVE placeholder
# Not a real CVE that exists. Safe to suppress.
suppress gen_id 1, sig_id 0, track by_src, ip 198.51.100.42

# --- TOR Relay Nodes ---
# Connecting to/from Tor nodes is not inherently malicious.
# Normal users using Tor browser or privacy-focused apps trigger these.
# We keep TOR EXIT node logging but suppress auto-blocks for now.
# Re-enable blocking manually if you suspect actual C2 via Tor.
